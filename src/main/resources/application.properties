spring.application.name=foreign-trading-system

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/foreign_trading_system?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=rootpassword

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable data.sql script (we'll create admin user programmatically)
spring.sql.init.mode=never
